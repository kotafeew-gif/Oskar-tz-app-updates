name: Build and Publish Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check version change
        id: version_check
        shell: pwsh
        run: |
          $current = (Get-Content package.json | ConvertFrom-Json).version
          $shouldRelease = $true

          if ("${{ github.event_name }}" -eq "push") {
            $previousJson = git show "${{ github.event.before }}:package.json" 2>$null
            if ($LASTEXITCODE -eq 0 -and $previousJson) {
              $previous = ($previousJson | ConvertFrom-Json).version
              if ($previous -eq $current) {
                $shouldRelease = $false
              }
            }
          }

          "version=$current" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "release=$shouldRelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Restore Google service account key
        if: steps.version_check.outputs.release == 'True' || github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GOOGLE_KEY_JSON: ${{ secrets.GOOGLE_KEY_JSON }}
        run: |
          if (-not $env:GOOGLE_KEY_JSON) {
            throw "Missing GOOGLE_KEY_JSON secret."
          }
          Set-Content -Path electron-app/google-key.json -Value $env:GOOGLE_KEY_JSON -Encoding utf8

      - name: Build and publish
        if: steps.version_check.outputs.release == 'True' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --publish always
